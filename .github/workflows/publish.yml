name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting, linting, types
        run: pnpm check

      - name: Test & coverage
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish
        run: pnpm publish --access public --provenance --config.publish-branch=master
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
