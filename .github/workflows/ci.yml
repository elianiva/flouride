name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22, 23]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Installing dependencies
        run: npm install

      - name: Check formatting, linting, types
        run: npx vp check

      - name: Test & coverage
        run: npm run test

      - name: Build
        run: npm run build

      - name: Send coverage report to Codecov
        uses: codecov/codecov-action@v3
